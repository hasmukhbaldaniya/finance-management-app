services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-management-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_management
    ports:
      - "5432:5432"
    volumes:
      - finance_management_pgdata:/var/lib/postgresql/data

volumes:
  finance_management_pgdata:
